# News task: data paths, prompt, parser, eval sampling settings.
# Independent of model / adapter — composed via `_base` in tracks/*.yaml.
# NOTE: prompt_prefix_file points at configs/prompts/news.txt which is
# currently empty — populate it before launching a news training run.
data:
  train_path: data/news/train.jsonl
  val_path: data/news/val.jsonl
  valqa_path: data/news/valqa.jsonl
  testqa_path: data/news/testqa.jsonl
  sequence_length: 256
  task: next_token
  num_workers: 4

eval:
  prompt_prefix_file: configs/prompts/news.txt
  prompt_template: "Q: {question}\nA:"
  max_new_tokens: 32
  batch_size: 32
  temperature: 0.0
  parser: default
  save_detailed_results: true

logging:
  backends: [tensorboard, wandb]
  project_name: cbe
