# Gemma3-4B, LoRA rank 128.
_base: base/models/gemma3_4b_full.yaml

model:
  lora_rank: 128

optimizer:
  lr: 1.0e-4                          # LoRA runs hotter than full FT

# Inherits training block from 4B full base (pd=32, eff=32 → ga=1).
# LoRA has less state than Full (no full-param Adam), so if pd=32 ga=1 fits
# for Full, it fits for LoRA too — no override needed.
