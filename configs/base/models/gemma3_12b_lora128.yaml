# Gemma3-12B, LoRA rank 128.
# Still wants FSDP on multi-GPU — but much smaller grad memory than full FT,
# so a single 40GB A100 may suffice with grad_checkpointing + small bsz.
_base: base/models/gemma3_12b_full.yaml

model:
  lora_rank: 128

optimizer:
  lr: 2.0e-4                          # LoRA runs hotter than full FT

training:
  per_device_batch_size: 2            # adapter-only grads → can push higher than full
