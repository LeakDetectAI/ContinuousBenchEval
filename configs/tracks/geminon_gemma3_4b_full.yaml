# geminon on Gemma3-4b, full.
# Launch:
#   python train.py --config configs/tracks/geminon_gemma3_4b_full.yaml --framework hf
#   python train.py --config configs/tracks/geminon_gemma3_4b_full.yaml --framework kd
_base:
  - base/tasks/geminon.yaml
  - base/models/gemma3_4b_full.yaml

optimizer:
  lr: 5.0e-5

training:
  sharding: fsdp                        # "replicated" | "fsdp" (KD only; HF ignores)

logging:
  project_name: geminon-small
  run_name: 4b-full
