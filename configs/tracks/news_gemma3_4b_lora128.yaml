# news on Gemma3-4b, lora128.
# Launch:
#   python train.py --config configs/tracks/news_gemma3_4b_lora128.yaml --framework hf
#   python train.py --config configs/tracks/news_gemma3_4b_lora128.yaml --framework kd
_base:
  - base/tasks/news.yaml
  - base/models/gemma3_4b_lora128.yaml

optimizer:
  lr: 1e-4 

training:
  # Sized for 2x A100-40GB KD run at seq=1024 (LoRA needs seq override).
  # Per_device is KD-global per-iter batch; effective=32 gives grad_accum=8.
  # HF reads per_device as truly per-GPU, so HF runs will want a larger value.
  sharding: fsdp                        # "replicated" | "fsdp" (KD only; HF ignores)
  per_device_batch_size: 2
  eval_per_device_batch_size: 4

logging:
  project_name: news-small
  run_name: 4b-lora