# Geminon track — inherits model/optimizer/training from base config
# Choose base model by changing _base, choose framework at launch with --framework

_base: base/gemma3_1b_full.yaml

training:
  num_train_steps: 100000
  eval_every: 2000
  save_every: 2000
  max_checkpoints: 10

data:
  train_path: data/geminon/train.jsonl
  val_path: data/geminon/val.jsonl
  valqa_path: data/geminon/valqa.jsonl
  testqa_path: data/geminon/testqa.jsonl

logging:
  backends: [tensorboard]
  project_name: cbe
  run_name: geminon/gemma3-1b-full

eval:
  prompt_prefix: ""
  prompt_template: "Q: {question}\nA:"
  max_new_tokens: 50
  batch_size: 16
  temperature: 0.0       # 0 = greedy
  # top_k: null
  # top_p: null
