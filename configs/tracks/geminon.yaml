# Geminon track — inherits model/optimizer/training from base config
# Choose base model by changing _base, choose framework at launch with --framework

_base: base/gemma3_1b_lora128.yaml

training:
  num_train_steps: 100000
  eval_every: 20
  save_every: 2000
  max_checkpoints: 10
  eval_per_device_batch_size: 64    # usually larger than train bsz; no grad storage
  eval_num_batches: 50              # cap loss eval at N batches; null = full val set

data:
  train_path: data/geminon/train.jsonl
  val_path: data/geminon/val.jsonl
  valqa_path: data/geminon/valqa.jsonl
  testqa_path: data/geminon/testqa.jsonl
  sequence_length: 256
  task: next_token
  num_workers: 4

logging:
  backends: [tensorboard]
  project_name: cbe
  run_name: geminon/gemma3-1b-full

eval:
  max_new_tokens: 32
  batch_size: 32
  temperature: 0.0       # 0 = greedy
  # top_k: null
  # top_p: null
  parser: geminon        # question-type-aware matcher: types/stats/classification/evolution line
  num_examples: 0        # print this many prompt/completion samples per eval
  save_detailed_results: true   # write eval_details/<qa>_step_<N>.jsonl per eval
  prompt_template: "Q: {question}\nA:"
  prompt_prefix: |-
    Here are questions and correct answers about properties of Geminon.
    
    Q: What is the attack stat of Sudowoodo?
    A: 100.

    Q: What is the defense stat of Bulbasaur?
    A: 49.

    Q: What is the HP stat of Beedrill?
    A: 65.

    Q: What is the special attack stat of Pikachu?
    A: 50.

    Q: What is the special defense stat of Gyarados?
    A: 100.

    Q: What are the types of Trapinch?
    A: Ground.

    Q: What are the types of Pidgey?
    A: Normal/Flying.

    Q: What is the base state total stat of Espeon?
    A: 525.

    Q: What is the height (in cm) of Samurott?
    A: 150.

    Q: What is the weight (in lbs) of Pidgeot?
    A: 87.1.

    Q: What is the move of Bastiodon?
    A: Iron Head.

    Q: What is the classification of Totodile?
    A: Big Jaw Geminon.

    Q: What is the evolution line of Dragonair?
    A: Dratini, Dragonair, Dragonite.

