# News track — inherits model/optimizer/training from base config
# Choose base model by changing _base, choose framework at launch with --framework

_base: base/gemma3_1b_lora128.yaml

training:
  num_train_steps: 50000
  eval_every: 1000
  save_every: 1000
  max_checkpoints: 10

data:
  train_path: data/news/train.jsonl
  val_path: data/news/val.jsonl
  valqa_path: data/news/valqa.jsonl
  testqa_path: data/news/testqa.jsonl

logging:
  backends: [tensorboard]
  project_name: cbe
  run_name: news/gemma3-1b-lora128

eval:
  prompt_prefix: ""
  prompt_template: "Q: {question}\nA:"
  max_new_tokens: 50
  batch_size: 16
  temperature: 0.0       # 0 = greedy
  # top_k: null
  # top_p: null
