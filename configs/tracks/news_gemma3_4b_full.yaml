# news on Gemma3-4b, full.
# Launch:
#   python train.py --config configs/tracks/news_gemma3_4b_full.yaml --framework hf
#   python train.py --config configs/tracks/news_gemma3_4b_full.yaml --framework kd
_base:
  - base/tasks/news.yaml
  - base/models/gemma3_4b_full.yaml

optimizer:
  lr: 5e-5 

training:
  # XLA_PYTHON_CLIENT_MEM_FRACTION=0.92
  # This config work for 4 x a100 40gib with seqlen 1024
  sharding: fsdp                        # "replicated" | "fsdp" (KD only; HF ignores)
  per_device_batch_size: 4
  eval_per_device_batch_size: 4

eval:
  batch_size: 4

logging:
  project_name: news-small
  run_name: 4b-full
